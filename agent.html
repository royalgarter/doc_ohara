<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Doc Ohara — Agent Command Center</title>
<style>
  body { font-family: ui-monospace, monospace; background: #0b0e14; color: #d6e2ff; margin: 0; padding: 24px; }
  h1 { font-size: 18px; color: #7fd8ff; }
  h2 { font-size: 14px; color: #9aa7c7; margin-top: 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .panel { background: #11151f; border: 1px solid #1f2535; border-radius: 8px; padding: 14px; }
  .row { padding: 6px 0; border-bottom: 1px solid #1a1f2e; font-size: 12px; }
  .row:last-child { border-bottom: none; }
  .tag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px; margin-right: 6px; }
  .tag.completed { background: #1f3d28; color: #6fdc8c; }
  .tag.active { background: #3d3a1f; color: #e0d36f; }
  .tag.failed { background: #3d1f1f; color: #e07f7f; }
  .tag.waiting { background: #1f2b3d; color: #6fa9e0; }
  textarea { width: 100%; height: 120px; background: #0b0e14; color: #d6e2ff; border: 1px solid #1f2535; border-radius: 6px; padding: 8px; font-family: inherit; font-size: 12px; }
  input { background: #0b0e14; color: #d6e2ff; border: 1px solid #1f2535; border-radius: 6px; padding: 6px; font-family: inherit; width: 70%; }
  button { background: #1f2b3d; color: #7fd8ff; border: 1px solid #2c3650; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-family: inherit; }
  pre { white-space: pre-wrap; font-size: 11px; }
  a { color: #7fd8ff; }
</style>
</head>
<body>
  <h1>🛰️ Doc Ohara — Agentic Command Center</h1>
  <p>Bridges the Space-Time Graph to AI agents. Tool catalog: <a href="/tools">/tools</a></p>

  <div class="grid">
    <div class="panel">
      <h2>Context View — focused node</h2>
      <input id="nodeIdInput" placeholder='e.g. documents/quantum_paper_001' />
      <button onclick="focusNode()">Focus</button>
      <div id="contextView"><em>Use ?node=&lt;id&gt; in the URL or the field above.</em></div>
    </div>

    <div class="panel">
      <h2>Active Worker Jobs</h2>
      <div id="jobsView"></div>
    </div>
  </div>

  <h2>System Prompt Generator</h2>
  <div class="panel">
    <textarea id="systemPrompt" readonly></textarea>
    <button onclick="refreshPrompt()">Regenerate</button>
  </div>

  <script>
    const params = new URLSearchParams(location.search);

    async function refreshJobs() {
      const res = await fetch('/api/queue/jobs');
      const data = await res.json();
      const last10 = data.jobs.slice(-10).reverse();
      document.getElementById('jobsView').innerHTML = last10.map(j => `
        <div class="row">
          <span class="tag ${j.status}">${j.status}</span>
          ${j.data.filename} — ${j.progressMessage || ''} (${j.progress}%)
        </div>
      `).join('') || '<em>No jobs yet.</em>';
    }

    async function focusNode() {
      const nodeId = document.getElementById('nodeIdInput').value.trim();
      if (!nodeId) return;
      const url = new URL(location.href);
      url.searchParams.set('node', nodeId);
      history.replaceState(null, '', url);
      const res = await fetch(`/api/retrieval/context/${encodeURIComponent(nodeId)}?depth=2`);
      const data = await res.json();
      document.getElementById('contextView').innerHTML = data.success
        ? `<pre>${JSON.stringify(data.context, null, 2)}</pre>`
        : `<em>${data.error}</em>`;
    }

    async function refreshPrompt() {
      const res = await fetch('/api/agent/system-prompt');
      const data = await res.json();
      document.getElementById('systemPrompt').value = data.prompt;
    }

    const initialNode = params.get('node');
    if (initialNode) {
      document.getElementById('nodeIdInput').value = initialNode;
      focusNode();
    }

    refreshJobs();
    refreshPrompt();
    setInterval(refreshJobs, 3000);
  </script>
</body>
</html>
